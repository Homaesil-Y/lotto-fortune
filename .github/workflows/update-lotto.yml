name: Update lotto data

# 매주 일요일 00:00 UTC (= 한국 일요일 오전 9시) 자동 실행 + 수동 실행 가능
on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 미러에서 최신 회차 데이터 받기
        run: node scripts/fetch-lotto-mirror.mjs

      - name: 변경분 커밋 & 푸시
        run: |
          if [ -n "$(git status --porcelain public/lotto.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/lotto.json
            git commit -m "chore: 로또 데이터 자동 갱신"
            git push
          else
            echo "변경 없음 — 커밋 건너뜀"
          fi
